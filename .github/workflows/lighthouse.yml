name: "Performance Test (Lighthouse)"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install serve
        run: npm install -g serve

      - name: Start server
        run: |
          serve -s build -l 3000 &
          sleep 5

      - name: Run Lighthouse
        run: |
          npx lighthouse http://localhost:3000 \
            --only-categories=performance \
            --quiet \
            --output=json \
            --output-path=./lighthouse.json

      - name: Show performance score
        run: |
          node -e "const r=require('./lighthouse.json'); console.log('Performance score:', r.categories.performance.score * 100)"
