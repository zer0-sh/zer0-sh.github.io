name: "Performance Test (Lighthouse)"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install serve
        run: npm install -g serve

      - name: Start server
        run: |
          serve -s build -l 3000 &
          sleep 5

      - name: Run Lighthouse
        run: |
          npx lighthouse http://localhost:3000 \
            --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
            --only-categories=performance \
            --output=json \
            --output-path=./lighthouse.json

      - name: Show score
        run: |
          node -e "const r=require('./lighthouse.json'); console.log('Performance:', r.categories.performance.score * 100)"

      - name: Generate summary
        run: |
          echo "## Lighthouse Performance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
      
          echo "URL: http://localhost:3000" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
      
          SCORE=$(node -e "const r=require('./lighthouse.json'); console.log(r.categories.performance.score * 100)")
          echo "Performance Score: $SCORE" >> $GITHUB_STEP_SUMMARY
