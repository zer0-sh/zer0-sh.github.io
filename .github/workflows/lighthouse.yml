name: "Lighthouse CI - Performance & SEO Audit"

run-name: "Lighthouse audit - ${{ github.sha }}"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lighthouse:
    name: "Run Lighthouse audit"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install serve
        run: npm install -g serve

      - name: Start local server
        run: |
          serve -s build -l 3000 &
          sleep 5

      - name: Run Lighthouse audit
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Generate summary
        run: |
          echo "## Lighthouse Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "URL: http://localhost:3000" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Results:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.lighthouse.outputs.results }}" >> $GITHUB_STEP_SUMMARY
