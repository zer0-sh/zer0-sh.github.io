<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo oscuro del tema -->
  <rect width="64" height="64" rx="12" fill="#0B0B0F"/>

  <!-- Gradiente -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3B3B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6A1B9A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Círculo del 0 -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="url(#grad1)" stroke-width="3"/>

  <!-- Línea diagonal del 0 cruzado (como consola) -->
  <line x1="16" y1="16" x2="48" y2="48" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
</svg>
